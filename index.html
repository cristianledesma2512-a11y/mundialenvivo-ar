<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MundialEnVivo AR</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #74ACDF; --bg: #0a0a0a; --card: #1a1a1a; --text: #eee; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); background: #000; }
        .video-container { width: 95%; max-width: 900px; aspect-ratio: 16/9; background: #000; margin: 20px 0; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; width: 95%; max-width: 900px; }
        .btn { background: var(--card); padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        /* EFECTO PARA CONTROL REMOTO (TV BOX) */
        .btn:focus, .btn:hover { border-color: var(--primary); transform: scale(1.05); outline: none; background: #222; }
        .btn img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; }
        .btn div { font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>MUNDIAL EN VIVO AR</h1></header>
    
    <div class="video-container" id="player">
        <div style="display:flex; height:100%; align-items:center; justify-content:center; color:#444">Seleccioná un canal</div>
    </div>

    <div class="grid">
        <div class="btn" tabindex="1" onclick="play('https://www.youtube.com/embed/live_stream?channel=UCj6PcyQrnc777S3S5n6F9eA')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/22/Televisi%C3%B3n_P%C3%BAblica_Argentina_-_Logo_2021.svg">
            <div>TV PÚBLICA</div>
        </div>
        <div class="btn" tabindex="2" onclick="play('https://www.youtube.com/embed/live_stream?channel=UCj6PcyQrnc777S3S5n6F9eA')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/TN_Logo.png">
            <div>TN</div>
        </div>
        <div class="btn" tabindex="3" onclick="play('https://www.capoplay.net/canal30.php')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/14/TyC_Sports_Logo_2016.png">
            <div>TYC SPORTS</div>
        </div>
    </div>

    <script>
        function play(url) {
            document.getElementById('player').innerHTML = `<iframe src="${url}" allowfullscreen referrerpolicy="no-referrer" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>`;
        }
        // Soporte Control Remoto (Enter)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.className === 'btn') document.activeElement.click();
        });
    </script>
</body>
</html>

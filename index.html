<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial AR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #74ACDF; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .box { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #111; margin: 10px auto; border: 1px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 12px; cursor: pointer; width: 120px; border: 2px solid #333; transition: 0.3s; }
        .card:hover { border-color: #74ACDF; transform: scale(1.05); }
        .card img { width: 100%; height: 60px; object-fit: contain; margin-bottom: 5px; background: #fff; border-radius: 5px; }
        video { width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <h2 style="color:white">MUNDIAL EN VIVO AR</h2>
    <div class="box" id="reproductor">Seleccioná un canal para empezar</div>
    <div class="grid" id="menu"></div>

    <script>
        const config = { databaseURL: "https://mundialenvivo-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);

        firebase.database().ref('/').on('value', (snap) => {
            const data = snap.val();
            const lista = data.canales.canales ? data.canales.canales : data.canales;
            const menu = document.getElementById('menu');
            menu.innerHTML = ''; 

            Object.keys(lista).forEach(id => {
                const canal = lista[id];
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => cargarVideo(canal.url);
                card.innerHTML = `<img src="${canal.logo}"><div><b>${canal.nombre}</b></div>`;
                menu.appendChild(card);
            });
        });

        function cargarVideo(url) {
            const container = document.getElementById('reproductor');
            if (url.includes('youtube.com') || url.includes('embed')) {
                container.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                container.innerHTML = `<video id="video" controls autoplay></video>`;
                const video = document.getElementById('video');
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MundialEnVivo AR</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
/* --- TUS COLORES Y ESTÉTICA ORIGINAL --- */
:root{
  --az:#001f3f;--az2:#003366;--cel:#74ACDF;--dor:#C5A059;
  --bg:#0a1628;--card:#0f2040;--card2:#152a50;--txt:#e8edf5;--muted:#6b7fa0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* HEADER */
#hdr{background:var(--az2);padding:12px;display:flex;align-items:center;border-bottom:2px solid var(--dor);z-index:100;}
.logo{font-size:18px;font-weight:700;flex:1;cursor:pointer;}
.logo span{color:var(--cel);}
.avatar{width:35px;height:35px;border-radius:50%;background:var(--card);border:1px solid var(--dor);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--dor);}

/* NAV TABS */
#nav-tabs{display:flex;background:rgba(0,0,0,0.2);flex-shrink:0;}
.ntab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.ntab.a{color:var(--dor);border-bottom-color:var(--dor);}

/* CONTENIDO PRINCIPAL */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.section{display:none;padding:15px;}
.section.a{display:block;}

/* PLAYER - MANTENIENDO PROPORCIÓN */
#player-hero{background:#000;width:100%;aspect-ratio:16/9;position:relative;}
#video-el, #iframe-el{width:100%;height:100%;display:none;border:none;}
#hero-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(to bottom, var(--az2), var(--bg));}

/* MODAL LOGIN ORIGINAL */
#modal-nick{position:fixed;inset:0;background:var(--az);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#modal-nick input{padding:12px;border-radius:8px;border:2px solid var(--cel);background:var(--card);color:#fff;width:100%;max-width:280px;text-align:center;margin-bottom:15px;outline:none;}
#nick-btn{background:var(--dor);border:none;padding:12px 40px;border-radius:8px;font-weight:700;color:var(--az);cursor:pointer;}

/* BOTÓN ADMIN FLOTANTE (NO DEFORMA NADA) */
#btn-admin{position:fixed;bottom:20px;right:20px;width:50px;height:50px;background:var(--dor);border-radius:50%;display:none;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,0.5);z-index:500;cursor:pointer;font-size:20px;}

/* CHAT */
#sec-chat{height:100%;display:none;flex-direction:column;padding:0;}
#chat-msgs{flex:1;overflow-y:auto;padding:15px;}
#chat-form{display:flex;padding:10px;background:var(--az2);gap:5px;}
#chat-in{flex:1;padding:10px;border-radius:20px;border:none;}
#chat-btn{background:var(--cel);border:none;padding:10px 15px;border-radius:20px;font-weight:700;}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--az2);padding:10px 20px;border-radius:20px;border:1px solid var(--dor);display:none;z-index:2000;}
</style>
</head>
<body>

<div id="modal-nick">
    <h1 style="margin-bottom:10px;">MundialEnVivo AR</h1>
    <input type="text" id="nick-in" placeholder="Tu Apodo..." maxlength="15">
    <button id="nick-btn">INGRESAR</button>
</div>

<div id="hdr">
    <div class="logo" id="logo-main">MUNDIAL<span>ENVIVO</span></div>
    <div class="avatar" id="user-badge" title="Cerrar Sesión">?</div>
</div>

<div id="nav-tabs">
    <div class="ntab a" onclick="tab('tv',this)">CANALES</div>
    <div class="ntab" onclick="tab('chat',this)">TRIBUNA</div>
</div>

<div id="main">
    <div id="sec-tv" class="section a">
        <div id="player-hero">
            <video id="video-el" controls autoplay></video>
            <iframe id="iframe-el"></iframe>
            <div id="hero-placeholder">
                <p>Seleccioná un canal para empezar</p>
            </div>
        </div>
        <div id="grid-canales" style="margin-top:20px;"></div>
    </div>

    <div id="sec-chat" class="section">
        <div id="chat-msgs"></div>
        <div id="chat-form">
            <input type="text" id="chat-in" placeholder="Escribí un mensaje...">
            <button id="chat-btn">ENVIAR</button>
        </div>
    </div>
</div>

<div id="btn-admin" onclick="verStats()">⚙️</div>
<div id="toast"></div>

<script>
// --- FIREBASE Y CONFIG ---
const config = { databaseURL: "https://mundialenvivo-ar-default-rtdb.firebaseio.com" };
firebase.initializeApp(config);
const db = firebase.database();
const ADMIN_HASH = "b4104157929d5b002447604616231926618d36357062a40498b95889659f2a9c"; // Tecno2026

let miNick = localStorage.getItem("mnv_nick") || "";
let esAdmin = false;

// --- SEGURIDAD Y LOGIN ---
async function hash(txt) {
    const buf = new TextEncoder().encode(txt);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

if(miNick) {
    document.getElementById("modal-nick").style.display = "none";
    document.getElementById("user-badge").textContent = miNick.slice(0,2).toUpperCase();
    if(miNick.toLowerCase() === "blackwitcher") esAdmin = true;
    if(esAdmin) document.getElementById("btn-admin").style.display = "flex";
}

document.getElementById("nick-btn").onclick = async () => {
    const n = document.getElementById("nick-in").value.trim();
    if(!n) return;
    
    if(n.toLowerCase() === "blackwitcher") {
        const p = prompt("Contraseña de Administrador:");
        if(await hash(p) !== ADMIN_HASH) return alert("Error");
        esAdmin = true;
    }

    localStorage.setItem("mnv_nick", n);
    location.reload();
};

document.getElementById("user-badge").onclick = () => {
    if(confirm("¿Cerrar sesión?")) {
        localStorage.removeItem("mnv_nick");
        location.reload();
    }
};

// --- LOGO RESET ---
document.getElementById("logo-main").onclick = () => location.reload();

// --- TABS Y PLAYER ---
function tab(t, b) {
    document.querySelectorAll(".section").forEach(s => s.style.display = "none");
    document.querySelectorAll(".ntab").forEach(n => n.classList.remove("a"));
    document.getElementById("sec-"+t).style.display = (t==='chat'?'flex':'block');
    b.classList.add("a");
}

db.ref('canales').on('value', snap => {
    const grid = document.getElementById("grid-canales");
    grid.innerHTML = "";
    snap.forEach(ch => {
        const c = ch.val();
        const d = document.createElement("div");
        d.style = "background:var(--card2); padding:15px; border-radius:8px; margin-bottom:10px; cursor:pointer; border-left:4px solid var(--cel);";
        d.innerHTML = `<strong>${c.nombre || ch.key}</strong>`;
        d.onclick = () => {
            document.getElementById("hero-placeholder").style.display = "none";
            const v = document.getElementById("video-el"), f = document.getElementById("iframe-el");
            if(c.url.includes(".m3u8")) {
                f.style.display="none"; v.style.display="block";
                if(Hls.isSupported()){ const h=new Hls(); h.loadSource(c.url); h.attachMedia(v); }
            } else { v.style.display="none"; f.style.display="block"; f.src=c.url; }
        };
        grid.appendChild(d);
    });
});

// --- ADMIN STATS ---
function verStats() {
    db.ref('stats/visitas_totales').once('value', s => {
        alert("📊 TECNOCOM STATS\n\nTotal Visitas: " + (s.val() || 0));
    });
}

// Contador silencioso
if(miNick) db.ref('stats/visitas_totales').transaction(c => (c || 0) + 1);

</script>
</body>
</html>

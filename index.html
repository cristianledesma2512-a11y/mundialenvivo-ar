<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MundialEnVivo AR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .box { width: 100%; max-width: 600px; aspect-ratio: 16/9; background: #111; margin: 20px auto; border: 2px solid #74ACDF; display: flex; align-items: center; justify-content: center; }
        .grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .card { background: #222; padding: 10px; border-radius: 8px; cursor: pointer; width: 100px; border: 1px solid #444; }
        .card img { width: 100%; height: 50px; object-fit: contain; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <h1>MUNDIAL AR - MODO TEST</h1>
    <div class="box" id="player">Esperando a Firebase...</div>
    <div class="grid" id="lista"></div>

    <script>
        // Si ves este texto en el celu, el código ya NO está en blanco
        console.log("Iniciando aplicación...");
        
        const config = { databaseURL: "https://mundialenvivo-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);

        firebase.database().ref('canales').on('value', (snap) => {
            const data = snap.val();
            const lista = document.getElementById('lista');
            const player = document.getElementById('player');
            lista.innerHTML = '';

            if (data) {
                player.innerText = "Seleccioná un canal";
                Object.keys(data).forEach(id => {
                    const c = data[id];
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.onclick = () => {
                        player.innerHTML = `<iframe src="${c.url}" allowfullscreen></iframe>`;
                    };
                    div.innerHTML = `<img src="${c.logo}"><div>${c.nombre}</div>`;
                    lista.appendChild(div);
                });
            } else {
                player.innerText = "Base de datos vacía o sin permisos";
            }
        });
    </script>
</body>
</html>

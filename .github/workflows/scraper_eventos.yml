name: Scraper Eventos Deportivos

on:
  schedule:
    - cron: '*/10 * * * *'   # Cada 10 min
  workflow_dispatch:          # Manual también

jobs:
  scraper-eventos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          cd scraper
          npm install

      - name: Instalar Chromium para Puppeteer
        run: npx puppeteer browsers install chrome
        working-directory: scraper

      - name: Correr scraper de eventos
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd scraper
          node scraper_eventos.js

name: Actualizar Canales

on:
  schedule:
    - cron: '0 */2 * * *'  # Se ejecuta cada 2 horas
  workflow_dispatch:      # Permite ejecutarlo manualmente desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias directamente
        run: |
          python -m pip install --upgrade pip
          pip install requests firebase-admin beautifulsoup4 lxml

      - name: Correr scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scraper/scraper.pyrrer scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scraper/scraper.py
